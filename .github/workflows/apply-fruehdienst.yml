name: Apply Frühdienst checklist

on:
  push:
    branches:
      - main
    paths:
      - tools/update_fruehdienst.py
      - .github/workflows/apply-fruehdienst.yml

permissions:
  contents: write

jobs:
  update-teambuch:
    runs-on: ubuntu-latest
    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Frühdienst-Checkliste einfügen
        run: python tools/update_fruehdienst.py

      - name: Änderungen veröffentlichen
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add site/index.html site/checklists.css site/checklists.js
          if git diff --cached --quiet; then
            echo "Keine Änderungen notwendig."
            exit 0
          fi
          git commit -m "Frühdienst-Checkliste digital ergänzen"
          git push

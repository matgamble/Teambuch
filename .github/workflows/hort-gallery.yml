name: Hort Galerie einbauen
on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/hort-gallery.yml
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - name: Galerie einfügen
        env:
          OLD_B64: PGFydGljbGUgY2xhc3M9ImNhcmQiPjxkaXYgY2xhc3M9InBob3RvLXBsYWNlaG9sZGVyIj5Gb3RvIFN0YW1tZ3J1cHBlPC9kaXY+PGRpdiBjbGFzcz0ibW90dG8tcGxhY2Vob2xkZXIiPlVuc2VyIE1vdHRvPC9kaXY+PGgzPkhvcnQ8L2gzPjxwPldlciBzaW5kIHdpcj8gV2FzIGlzdCB1bnMgd2ljaHRpZz88L3A+PC9hcnRpY2xlPg==
          NEW_B64: 
          LBS_B64: 
          MARKER_B64: PGRpdiBjbGFzcz0ibGlnaHRib3giIGlkPSJ3b3JkY2xvdWQtc3RvbHoiPg==
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64, os
          p=Path("site/index.html")
          s=p.read_text()
          dec=lambda n: base64.b64decode(os.environ[n]).decode()
          old,new,lbs,marker=map(dec,["OLD_B64","NEW_B64","LBS_B64","MARKER_B64"])
          if old not in s:
              raise SystemExit("Hort-Platzhalter nicht gefunden")
          s=s.replace(old,new,1)
          if marker not in s:
              raise SystemExit("Lightbox-Marker nicht gefunden")
          s=s.replace(marker,lbs+marker,1)
          p.write_text(s)
          PY
      - name: Speichern
        run: |
          git config user.name "ChatGPT"
          git config user.email "actions@users.noreply.github.com"
          git add site/index.html
          git commit -m "Stammgruppe Hort als Galerie einfügen"
          git push
